app:
    build: .
    restart: always
    ports:
      - "3000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      RESEND_API: ${RESEND_API}
      BASE_URL: ${BASE_URL}
      NODE_ENV: production
    depends_on:
      - db
    networks:
      - dokploy-network
    command: sh -c "sleep 5 && bun run db:migrate && bun src/index.tsx"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.booklet.rule=Host(`livret.louismaucourt.fun`)"
      - "traefik.http.routers.booklet.entrypoints=websecure"
      - "traefik.http.routers.booklet.tls.certResolver=letsencrypt"
      - "traefik.http.services.booklet.loadbalancer.server.port=3000"