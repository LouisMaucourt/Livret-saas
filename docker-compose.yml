version: "3.9"

services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - dokploy-network

  app:
    build: .
    restart: always
    ports:
      - "3000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      RESEND_API: ${RESEND_API}
      BASE_URL: ${BASE_URL}
      NODE_ENV: production
    depends_on:
      - db
    networks:
      - dokploy-network
    command: sh -c "bun src/index.tsx"

networks:
  dokploy-network:
    external: true

volumes:
  pgdata: